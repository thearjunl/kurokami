[ai]
default_model = qwen2.5:14b
fallback_model = dolphin-mistral
ollama_host = http://127.0.0.1:11434

[database]
# Path can be absolute, or relative to the project directory
db_path = data/kurokami.db

[security]
# Set to 'true' to enable Fernet encryption for workspace outputs
workspace_encryption = false
allow_exploits = false
# fernet_key = <base64 encoded key>

[paths]
# Directory layout relative to project root
exports_dir = data/exports
logs_dir = data/logs
vector_store_dir = data/vector_store
